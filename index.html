<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Portal</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}

header{
  padding:15px;
  text-align:center;
  background:#222;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1c1c1c;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
}

.card h3{
  padding:10px;
  margin:0;
  font-size:14px;
}
</style>
</head>

<body>

<header>VIDEO PORTAL</header>

<div class="grid" id="grid"></div>

<script>
async function loadVideos(){

  const res = await fetch('/.netlify/functions/videos');
  const data = await res.json();

  const grid = document.getElementById('grid');

  // sesuaikan dengan format API DoodStream
  const files = data.result?.files || [];

  files.forEach(video => {

    const code = video.filecode || video.file_code;

    const title = video.title || "No Title";

    const thumb = video.single_img || video.splash_img;

    const card = document.createElement('div');
    card.className = "card";

    card.innerHTML = `
      <a href="watch.html?code=${code}">
        <img src="${thumb}">
      </a>
      <h3>${title}</h3>
    `;

    grid.appendChild(card);

  });

}

loadVideos();
</script>

</body>
</html>
