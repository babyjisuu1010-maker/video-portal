<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asupan Malam</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
}

header{
  background:#1a1a1a;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}

.card h3{
  font-size:14px;
  padding:10px;
  margin:0;
}
</style>

</head>
<body>

<header>Asupan Malam</header>

<div class="grid" id="videos"></div>

<script>

async function loadVideos(){

  try{

    const response = await fetch('/api/video');
    const data = await response.json();

    const files = data.result.files;

    const container =
      document.getElementById('videos');

    container.innerHTML='';

    files.forEach(video=>{

      container.innerHTML += `
  <a href="watch.html?code=${video.file_code}" style="text-decoration:none;color:white;">
    <div class="card">
      <img src="${video.single_img}">
      <h3>${video.title}</h3>
    </div>
  </a>
`;

    });

  }catch(err){

    document.getElementById('videos').innerHTML =
      '<h2>Gagal memuat video</h2>';

  }

}

loadVideos();

</script>

</body>
</html>
