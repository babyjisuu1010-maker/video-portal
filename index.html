<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asupan Malam</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
}

header{
  background:#1a1a1a;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}

.card h3{
  font-size:14px;
  padding:10px;
  margin:0;
}
</style>

</head>
<body>

<header>Asupan Malam</header>

<div style="padding:15px;">
  <input
    type="text"
    id="search"
    placeholder="Cari video..."
    style="
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      box-sizing:border-box;
      font-size:16px;
    "
  >
</div>

<div class="grid" id="videos"></div>
<div
  id="pagination"
  style="
    text-align:center;
    padding:20px;
  ">
</div>

<script>

let allVideos = [];

let currentPage = 1;

let totalPages = 1;

async function loadVideos(page = 1){

  try{

    const response =
      await fetch(`/api/video?page=${page}`);

    const data =
      await response.json();

    allVideos =
      data.result.files;

    totalPages =
      data.result.total_pages || 1;

    currentPage = page;

    renderVideos(allVideos);

    renderPagination();

  }catch(err){

    document.getElementById('videos').innerHTML =
      '<h2>Gagal memuat video</h2>';

  }

}

function renderVideos(videos){

  const container =
    document.getElementById('videos');

  container.innerHTML='';

  videos.forEach(video=>{

    container.innerHTML += `
      <a href="watch.html?code=${video.file_code}"
         style="text-decoration:none;color:white;">
        <div class="card">
          <img src="${video.single_img}">
          <h3>${video.title}</h3>
        </div>
      </a>
    `;

  });

}

function renderPagination(){

  document.getElementById('pagination').innerHTML =
    'TEST PAGINATION';

}

  let html = '';

  if(currentPage > 1){

    html += `
      <button onclick="loadVideos(${currentPage-1})">
        ← Prev
      </button>
    `;

  }

  html += `
    <span style="margin:0 15px;">
      Halaman ${currentPage} / ${totalPages}
    </span>
  `;

  if(currentPage < totalPages){

    html += `
      <button onclick="loadVideos(${currentPage+1})">
        Next →
      </button>
    `;

  }

  document.getElementById('pagination')
    .innerHTML = html;

}

document.addEventListener("input",(e)=>{

  if(e.target.id==="search"){

    const keyword =
      e.target.value.toLowerCase();

    const filtered =
      allVideos.filter(video =>
        video.title.toLowerCase()
        .includes(keyword)
      );

    renderVideos(filtered);

  }

});

loadVideos(1);

</script>

</body>
</html>
