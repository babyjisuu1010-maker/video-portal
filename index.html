<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asupan Malam</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:Arial, sans-serif;
}

/* HEADER */
header{
  background:#181818;
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-bottom:1px solid #2a2a2a;
}

/* SEARCH */
.search-box{
  padding:12px;
  text-align:center;
}

.search-box input{
  width:90%;
  max-width:400px;
  padding:10px;
  border:none;
  border-radius:6px;
  outline:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
  padding:14px;
}

/* CARD */
.card{
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  padding:10px;
  margin:0;
  height:40px;
  overflow:hidden;
}

/* PAGINATION */
.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  padding:15px;
}

.pagination button{
  padding:8px 12px;
  border:none;
  background:#2a2a2a;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.pagination button:hover{
  background:#3a3a3a;
}

a{
  text-decoration:none;
  color:inherit;
}
</style>
</head>

<body>

<header>VIDEO PORTAL</header>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="search" placeholder="Search video...">
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PAGINATION -->
<div class="pagination">
  <button id="prev">Prev</button>
  <span id="pageInfo"></span>
  <button id="next">Next</button>
</div>

<script>
let allVideos = [];
let currentPage = 1;
const limit = 12;

/* LOAD DATA */
async function loadVideos(){
  const res = await fetch('/.netlify/functions/videos');
  const data = await res.json();

  allVideos = data.result?.files || [];

  render();
}

/* FILTER SEARCH */
function getFilteredVideos(){
  const keyword = document.getElementById("search").value.toLowerCase();

  return allVideos.filter(v =>
    (v.title || "").toLowerCase().includes(keyword)
  );
}

/* RENDER */
function render(){

  const grid = document.getElementById('grid');
  grid.innerHTML = "";

  const filtered = getFilteredVideos();

  const totalPages = Math.ceil(filtered.length / limit) || 1;

  if(currentPage > totalPages){
    currentPage = 1;
  }

  const start = (currentPage - 1) * limit;
  const pageItems = filtered.slice(start, start + limit);

  pageItems.forEach(video => {

    const code = video.filecode || video.file_code;
    const title = video.title || "No Title";
    const thumb = video.single_img || video.splash_img;

    grid.innerHTML += `
      <div class="card">
        <a href="watch.html?code=${code}">
          <img src="${thumb}">
        </a>
        <h3>${title}</h3>
      </div>
    `;
  });

  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} / ${totalPages}`;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", () => {
  currentPage = 1;
  render();
});

/* PAGINATION */
document.getElementById("prev").addEventListener("click", () => {
  if(currentPage > 1){
    currentPage--;
    render();
  }
});

document.getElementById("next").addEventListener("click", () => {
  const filtered = getFilteredVideos();
  const totalPages = Math.ceil(filtered.length / limit) || 1;

  if(currentPage < totalPages){
    currentPage++;
    render();
  }
});

loadVideos();
</script>

</body>
</html>
