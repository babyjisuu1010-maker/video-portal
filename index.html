<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Portal</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#222;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#1c1c1c;
    border-radius:8px;
    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
}

.card h3{
    margin:0;
    padding:10px;
    font-size:16px;
}
</style>
</head>

<body>

<header>
VIDEO PORTAL
</header>

<div class="grid">

<div class="card">
<img src="https://doimg.net/snaps/lplz7ztp2fawjsix.jpg">
<h3>Video 1</h3>
</div>

<div class="card">
<img src="https://picsum.photos/400/225?2">
<h3>Video 2</h3>
</div>

<div class="card">
<img src="https://picsum.photos/400/225?3">
<h3>Video 3</h3>
</div>

<div class="card">
<img src="https://picsum.photos/400/225?4">
<h3>Video 4</h3>
</div>

</div>

</body>
</html>
