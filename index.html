<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASUPAN MALAM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  background:#181818;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

header a{
  color:white;
  text-decoration:none;
}

/* SEARCH */
.search{
  padding:10px;
  text-align:center;
}

.search input{
  width:90%;
  max-width:400px;
  padding:10px;
  border-radius:6px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#1c1c1c;
  border-radius:8px;
  overflow:hidden;
}

.card img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  padding:8px;
  margin:0;
}

/* PAGINATION */
.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  padding:15px;
}

button{
  padding:8px 12px;
  border:none;
  background:#2a2a2a;
  color:white;
  border-radius:6px;
}
button:hover{
  background:#444;
}
</style>
</head>

<body>

<header>
  <a href="index.html">ASUPAN MALAM</a>
</header>

<div class="search">
  <input id="search" placeholder="Search video...">
</div>

<div class="grid" id="grid"></div>

<div class="pagination">
  <button id="prev">Prev</button>
  <span id="pageInfo"></span>
  <button id="next">Next</button>
</div>

<script>
let allVideos = [];
let currentPage = 1;
const limit = 12;

/* 🔥 GANTI API KAMU DI SINI */
const API_URL = "https://doodapi.co/api/file/list?key={530203nxa1v3m6ng2kbgdh";

async function loadVideos(){
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    console.log("API DATA:", data);

    allVideos = data.result?.files || [];
    render();

  } catch (err) {
    console.log("ERROR:", err);
  }
}

/* SEARCH FILTER */
function filtered(){
  const q = document.getElementById("search").value.toLowerCase();
  return allVideos.filter(v =>
    (v.title || v.name || "").toLowerCase().includes(q)
  );
}

/* RENDER */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const list = filtered();
  const totalPages = Math.ceil(list.length / limit) || 1;

  if(currentPage > totalPages) currentPage = 1;

  const start = (currentPage - 1) * limit;
  const pageItems = list.slice(start, start + limit);

  pageItems.forEach(v => {

    const code = v.filecode || v.file_code;
    const title = v.title || v.name || "No Title";
    const thumb = v.single_img || v.splash_img;

    grid.innerHTML += `
      <div class="card">
        <a href="watch.html?code=${code}">
          <img src="${thumb}">
        </a>
        <h3>${title}</h3>
      </div>
    `;
  });

  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} / ${totalPages}`;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", () => {
  currentPage = 1;
  render();
});

/* PAGINATION */
document.getElementById("prev").onclick = () => {
  if(currentPage > 1){
    currentPage--;
    render();
  }
};

document.getElementById("next").onclick = () => {
  const totalPages = Math.ceil(filtered().length / limit) || 1;
  if(currentPage < totalPages){
    currentPage++;
    render();
  }
};

loadVideos();
</script>

</body>
</html>
