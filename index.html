<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Portal</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:Arial, sans-serif;
}

/* header */
header{
  background:#181818;
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
  border-bottom:1px solid #2a2a2a;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
  padding:14px;
}

/* card */
.card{
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

/* thumbnail */
.card img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
}

/* title */
.card h3{
  font-size:14px;
  padding:10px;
  margin:0;
  color:#e5e5e5;
  height:40px;
  overflow:hidden;
}

/* link reset */
a{
  text-decoration:none;
  color:inherit;
}
</style>
</head>

<body>

<header>VIDEO PORTAL</header>

<div class="grid" id="grid"></div>

<script>
async function loadVideos(){

  const res = await fetch('/.netlify/functions/videos');
  const data = await res.json();

  const grid = document.getElementById('grid');

  // sesuaikan dengan format API DoodStream
  const files = data.result?.files || [];

  files.forEach(video => {

    const code = video.filecode || video.file_code;

    const title = video.title || "No Title";

    const thumb = video.single_img || video.splash_img;

    const card = document.createElement('div');
    card.className = "card";

    card.innerHTML = `
      <a href="watch.html?code=${code}">
        <img src="${thumb}">
      </a>
      <h3>${title}</h3>
    `;

    grid.appendChild(card);

  });

}

loadVideos();
</script>

</body>
</html>
