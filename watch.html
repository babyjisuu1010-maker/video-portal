<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Player</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.player{
    position:relative;
    width:100%;
    padding-top:56.25%;
}

.player iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="player">
    <iframe id="player" allowfullscreen></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(code){
    document.getElementById("player").src =
        "https://dood.to/e/" + code;
}
</script>

</body>
</html>
