<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch Video</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header{
  padding:15px;
  background:#181818;
  text-align:center;
}

header a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.container{
  padding:10px;
}

iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:8px;
}

h2{
  font-size:16px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <a href="index.html">⬅ Kembali</a>
</header>

<div class="container">

  <iframe id="player" allowfullscreen></iframe>

  <h2 id="title">Loading...</h2>

</div>

<script>

const API_KEY = "API_KEY_KAMU";

// ambil code dari URL
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");

async function loadVideo(){

  if(!code){
    document.getElementById("title").innerText = "Video tidak ditemukan";
    return;
  }

  try {
    const res = await fetch(`https://doodapi.co/api/file/info?key=${API_KEY}&file_code=${code}`);
    const data = await res.json();

    console.log(data);

    const video = data?.result || data;

    document.getElementById("title").innerText =
      video.title || "No Title";

    // embed player (INI YANG PENTING)
    document.getElementById("player").src =
      video.embed_url || video.embed || "";

  } catch (err) {
    console.log("ERROR:", err);
  }
}

loadVideo();

</script>

</body>
</html>
