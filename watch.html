<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tonton Video</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
}

.header{
  background:#1a1a1a;
  padding:15px;
  text-align:center;
}

.header a{
  color:white;
  text-decoration:none;
  font-size:20px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:10px;
}

#title{
  margin-top:15px;
  font-size:20px;
}
#relatedVideos{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  margin-top:15px;
}

.related-card{
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.related-card img{
  width:100%;
  display:block;
}

.related-card h4{
  margin:0;
  padding:10px;
  font-size:14px;
  color:white;
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html">← Kembali ke Home</a>
</div>

<div class="container">

  <iframe id="player" allowfullscreen></iframe>

  <h2 id="title">Loading...</h2>
  <h3>Video Lainnya</h3>

<div id="relatedVideos"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

document.getElementById("player").src =
  `https://dood.wf/e/${code}`;

async function loadTitle(){

  try{

    const response = await fetch('/api/video');
    const data = await response.json();

    const files = data.result.files;

    const video =
      files.find(v => v.file_code === code);

    if(video){

      document.getElementById("title")
        .textContent = video.title;

    }

    const related =
      files.filter(v => v.file_code !== code)
           .slice(0,8);

    const container =
      document.getElementById("relatedVideos");

    container.innerHTML = '';

    related.forEach(v=>{

      container.innerHTML += `
        <a href="watch.html?code=${v.file_code}"
           style="text-decoration:none;">

          <div class="related-card">

            <img src="${v.single_img}">

            <h4>${v.title}</h4>

          </div>

        </a>
      `;

    });

  }catch(err){

    document.getElementById("title")
      .textContent = "Video tidak ditemukan";

  }

}

loadTitle();

</script>

</body>
</html>
